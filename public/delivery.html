<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доставка - SmartPrice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page page-delivery">
  <div class="page-glow" aria-hidden="true">
    <span class="glow glow-a"></span>
    <span class="glow glow-b"></span>
  </div>

  <header class="site-header site-header-compact">
    <div class="container site-header__inner">
      <a href="/" class="brand">
        <span class="brand__mark">S</span>
        <span><strong>SmartPrice</strong><small>Доставка</small></span>
      </a>
      <nav class="site-nav">
        <a href="/cabinet">← Корзина</a>
      </nav>
      <div class="checkout-steps">
        <span class="checkout-step is-active">1. Доставка</span>
        <span class="checkout-step-sep">→</span>
        <span class="checkout-step">2. Оплата</span>
        <span class="checkout-step-sep">→</span>
        <span class="checkout-step">3. Отслеживание</span>
      </div>
    </div>
  </header>

  <main class="delivery-layout container">

    <section class="panel delivery-form-panel reveal-up">
      <span class="eyebrow eyebrow-soft">Шаг 1</span>
      <h2>Адрес доставки</h2>
      <p class="panel-copy">Укажите адрес и мы рассчитаем маршрут курьера.</p>

      <div id="savedAddresses" class="saved-addresses hidden"></div>

      <form id="deliveryForm" class="delivery-form">
        <label class="field">
          <span class="field__label">Имя получателя *</span>
          <input id="dName" type="text" placeholder="Медет Мустафин" autocomplete="name" required>
        </label>
        <label class="field">
          <span class="field__label">Телефон *</span>
          <input id="dPhone" type="tel" placeholder="+7 700 000 00 00" autocomplete="tel" required>
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field__label">Город *</span>
            <input id="dCity" type="text" value="Астана" autocomplete="address-level2" required>
          </label>
          <label class="field">
            <span class="field__label">Улица *</span>
            <input id="dStreet" type="text" placeholder="пр. Достык" autocomplete="address-line1" required>
          </label>
        </div>
        <div class="field-row">
          <label class="field">
            <span class="field__label">Дом *</span>
            <input id="dHouse" type="text" placeholder="5А" required>
          </label>
          <label class="field">
            <span class="field__label">Квартира</span>
            <input id="dApartment" type="text" placeholder="12">
          </label>
        </div>

        <div id="deliveryRouteInfo" class="delivery-route-info hidden">
          <span id="routeDistance" class="route-stat"></span>
          <span id="routeTime" class="route-stat"></span>
        </div>

        <div id="deliveryError" class="form-message form-message-error"></div>

        <button id="submitDeliveryBtn" class="btn btn-primary btn-block" type="submit">
          Продолжить к оплате →
        </button>
      </form>
    </section>

    <section class="delivery-map-section reveal-up delay-1">
      <div class="delivery-map-header">
        <span class="eyebrow eyebrow-soft">Маршрут</span>
        <div id="mapStatus" class="map-status">Введите адрес для построения маршрута</div>
      </div>
      <div id="deliveryMap" class="delivery-map"></div>
      <div class="map-legend">
        <span class="map-legend-item"><span class="legend-dot legend-dot-a">A</span> Склад SmartPrice</span>
        <span class="map-legend-item"><span class="legend-dot legend-dot-b">B</span> Ваш адрес</span>
      </div>
    </section>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/delivery.js"></script>
</body>
</html>
